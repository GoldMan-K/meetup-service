spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/meetup_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    hostname: meetup-service
    prefer-ip-address: false

member-service:
  base-url: ${MEMBER_SERVICE_BASE_URL:http://member-service:8080}
  nickname-path: ${MEMBER_SERVICE_NICKNAME_PATH:/internal/members/nicknames}

internal:
  api-key: ${INTERNAL_API_KEY}

server:
  port: 8084

logging:
  level:
    com.meetup: DEBUG
